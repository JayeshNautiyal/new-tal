/* ─── Critical above-fold CSS — inlined for instant FCP ─── */
:root{--n9:#060c1e;--n8:#0a1328;--n7:#0d1a38;--g5:#00e5a0;--g6:#00b87d;--b5:#2979ff;--wh:#fff;--g2:#d8e0f0;--g4:#8892b0;--red:#ff4d6d;--sans:'Inter',system-ui,-apple-system,sans-serif;--nav:72px;--mw:1200px;--r-md:12px;--r-lg:20px;--r-full:9999px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{font-family:var(--sans);background:var(--n9);color:var(--wh);-webkit-font-smoothing:antialiased;overflow-x:hidden}
.page-body{padding-top:var(--nav)}
/* ── Nav skeleton (visible before JS injects full nav) ── */
#th-header{position:fixed;top:0;left:0;right:0;z-index:1000;height:var(--nav);background:transparent;transition:background .25s ease,box-shadow .25s ease}
#th-header.scrolled{background:rgba(6,12,30,.95);backdrop-filter:blur(20px);box-shadow:0 1px 0 rgba(255,255,255,.06)}
.nav-inner{max-width:var(--mw);margin:0 auto;padding:0 24px;height:100%;display:flex;align-items:center;justify-content:space-between;gap:32px}
.nav-logo{display:flex;align-items:center;gap:10px;flex-shrink:0}
.nav-logo img{height:36px;width:auto;display:block}
.nav-cta{display:inline-flex;align-items:center;padding:10px 22px;background:linear-gradient(135deg,var(--g5),var(--g6));color:var(--n9)!important;border-radius:var(--r-full);font-weight:700;font-size:.9rem;text-decoration:none;flex-shrink:0}
/* ── Hero ── */
.hero{position:relative;min-height:88vh;display:flex;align-items:center;background:#03071a;overflow:hidden}
.hero-bg{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.hero-content{position:relative;z-index:2}
.container{max-width:var(--mw);margin:0 auto;padding:0 24px}
.hero-split{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center}
.hero-badge{margin-bottom:24px}
.badge{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:var(--r-full);font-size:.78rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase}
.badge-green{background:rgba(0,229,160,.12);color:var(--g5);border:1px solid rgba(0,229,160,.2)}
.hero-h1{font-size:clamp(2.2rem,4.5vw,3.8rem);font-weight:800;line-height:1.1;letter-spacing:-.03em;margin-bottom:24px;color:var(--wh)}
.hero-h1 span{color:var(--g5)}
.hero-p{font-size:1.1rem;line-height:1.75;color:var(--g2);max-width:52ch;margin-bottom:40px}
.hero-ctas{display:flex;gap:16px;flex-wrap:wrap}
/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;border-radius:var(--r-full);font-weight:600;font-size:.95rem;cursor:pointer;border:none;text-decoration:none;font-family:var(--sans);transition:all .25s ease;position:relative;overflow:hidden;white-space:nowrap}
.btn-primary{background:linear-gradient(135deg,var(--g5),var(--g6));color:var(--n9);box-shadow:0 4px 20px rgba(0,229,160,.35)}
.btn-secondary{background:transparent;color:var(--wh);border:1.5px solid rgba(255,255,255,.25)}
.btn-lg{padding:18px 36px;font-size:1.05rem}
/* ── Hero trust row ── */
.hero-trust{display:flex;gap:32px;flex-wrap:wrap;margin-top:48px;padding-top:40px;border-top:1px solid rgba(255,255,255,.08)}
.hero-trust-item{text-align:center}
.hero-trust-item .num{font-size:1.8rem;font-weight:800;color:var(--g5);line-height:1}
.hero-trust-item .lbl{font-size:.8rem;color:var(--g4);margin-top:4px}
/* ── Hero form card ── */
.hero-form-card{background:var(--n8);border:1px solid rgba(255,255,255,.1);border-radius:var(--r-lg);padding:40px;overflow:visible}
.hero-form-card h3{font-size:1.35rem;font-weight:700;margin-bottom:6px;color:var(--wh)}
.hero-form-card p{font-size:.9rem;color:var(--g4);margin-bottom:28px}
/* ── Forms ── */
.form-group{margin-bottom:20px}
.form-label{display:block;font-size:.82rem;font-weight:600;color:var(--g2);margin-bottom:7px}
.required{color:var(--red);margin-left:2px}
.form-input{width:100%;padding:12px 16px;background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1);border-radius:var(--r-md);color:var(--wh);font-size:.95rem;font-family:var(--sans);outline:none}
.form-input::placeholder{color:#4a5568}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-submit{width:100%;padding:16px;background:linear-gradient(135deg,var(--g5),var(--g6));color:var(--n9);font-weight:700;font-size:1rem;border:none;border-radius:var(--r-full);cursor:pointer;font-family:var(--sans)}
.form-note{text-align:center;font-size:.75rem;color:#4a5568;margin-top:12px}
.form-error-msg{display:none;font-size:.78rem;color:var(--red);margin-top:5px}
/* ── Breadcrumb ── */
.breadcrumb{display:flex;align-items:center;gap:8px;font-size:.82rem;color:var(--g4);padding:16px 0}
.breadcrumb a{color:var(--g4);text-decoration:none}
.stats-bar{background:var(--n8);border-top:1px solid rgba(255,255,255,.06);border-bottom:1px solid rgba(255,255,255,.06)}.stats-grid{display:grid;grid-template-columns:repeat(7,1fr);text-align:center}.stat-item{padding:32px 16px;border-right:1px solid rgba(255,255,255,.06)}.stat-item:last-child{border-right:none}.stat-num{font-size:clamp(2rem,4vw,3.2rem);font-weight:800;letter-spacing:-.03em;background:linear-gradient(135deg,var(--g5),#5393ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}.stat-label{font-size:.85rem;color:var(--g4);margin-top:6px}.section{padding:clamp(64px,8vw,120px) 0}.section-sm{padding:clamp(40px,5vw,72px) 0}.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:24px}.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}.t-h2{font-size:clamp(1.5rem,3vw,2.4rem);line-height:1.25;font-weight:700;letter-spacing:-.02em}.t-h3{font-size:clamp(1.1rem,2vw,1.5rem);line-height:1.35;font-weight:600}.t-body{font-size:1rem;line-height:1.72}.text-muted{color:var(--g4)}.mb-32{margin-bottom:32px}.section-label{display:inline-flex;align-items:center;gap:8px;margin-bottom:16px;font-size:.8rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--g5)}.section-label::before{content:"";display:block;width:24px;height:2px;background:var(--g5);border-radius:2px}@media(max-width:1024px){.stats-grid{grid-template-columns:repeat(4,1fr)}.grid-4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){.nav-links{display:none!important}.nav-cta{display:none!important}.nav-hamburger{display:flex!important;flex-direction:column;gap:5px;cursor:pointer;padding:8px;background:none;border:none;flex-shrink:0}.nav-hamburger span{display:block;width:22px;height:2px;background:#fff;border-radius:2px}}
@media(max-width:768px){.stats-grid{grid-template-columns:repeat(2,1fr)!important}.stat-item{padding:20px 12px}.stat-num{font-size:1.8rem}.hero-trust{gap:16px;justify-content:center}.hero-trust-item .num{font-size:1.5rem}}html{overflow-x:hidden}
:root{--navy-900:#060c1e;--navy-800:#0a1328;--navy-700:#0d1a38;--green-500:#00e5a0;--green-600:#00b87d;--blue-500:#2979ff;--grey-200:#d8e0f0;--grey-400:#8892b0;--nav-h:72px;--white:#fff;--radius-md:12px;--radius-lg:20px;--radius-full:9999px;}.nav-mobile{display:none;position:fixed;top:72px;left:0;right:0;bottom:0;background:#060c1e;z-index:1001;padding:24px;overflow-y:auto;flex-direction:column;gap:8px;}.nav-mobile.open{display:flex}.nav-mobile a{display:block;padding:14px 16px;color:#fff;text-decoration:none;border-radius:10px;font-size:1rem;font-weight:500;border-bottom:1px solid rgba(255,255,255,.06);}.nav-mobile a:last-child{border-bottom:none}.mob-section-title{font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#8892b0;padding:20px 16px 8px;}
/* ── Mobile ── */
@media(max-width:768px){.grid-3{grid-template-columns:1fr}.grid-2{grid-template-columns:1fr}
  .hero-split{grid-template-columns:1fr;gap:32px}
  .hero-form-card{padding:24px}
  .form-row{grid-template-columns:1fr}
  .hero-trust{gap:16px}
}
</style>
